version: '3.8'
services:
  cassandra:
    image: cassandra:latest
    container_name: flex-cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:alpine
    container_name: flex-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: flexstream-app
    ports:
      - "8080:8080"
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - SPRING_DATA_CASSANDRA_CONTACT_POINTS=cassandra
      - SPRING_REDIS_HOST=redis
    volumes:
      - /Users/adityashankar/Downloads:/data
